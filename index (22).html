<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dots</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0e8;--ink:#1a1612;--sh:rgba(26,22,18,0.18);
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Space Mono','Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--cream);font-family:var(--serif)}

#enter{position:fixed;inset:0;background:var(--cream);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 1s ease}
#enter.gone{opacity:0;pointer-events:none}
#enter h1{font-style:italic;font-weight:300;font-size:5rem;color:var(--ink);letter-spacing:0.15em}
#enter p{font-family:var(--mono);font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);opacity:0.3}
#enter-btn{margin-top:12px;background:transparent;border:1px solid rgba(26,22,18,0.32);color:var(--ink);font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;padding:13px 38px;cursor:pointer;transition:background 0.2s,color 0.2s}
#enter-btn:hover{background:var(--ink);color:var(--cream)}

#stage{position:fixed;inset:0;overflow:hidden;cursor:crosshair}

#bar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:18px 26px;z-index:500;pointer-events:none}
#bar-logo{font-style:italic;font-weight:300;font-size:2.2rem;color:var(--ink);letter-spacing:0.1em;opacity:0.75;text-shadow:0 1px 8px var(--cream)}
#add-btn{pointer-events:all;background:var(--ink);color:var(--cream);border:none;padding:10px 20px;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;opacity:0.85;transition:opacity 0.2s,transform 0.15s}
#add-btn:hover{opacity:1;transform:translateY(-1px)}
#file-in{display:none}

.photo{position:absolute;user-select:none;cursor:grab}
.photo:active{cursor:grabbing}
.photo-mat{background:#fff;padding:9px 9px 30px;box-shadow:0 6px 28px var(--sh),0 1px 6px var(--sh);transition:box-shadow 0.25s}
.photo:hover .photo-mat{box-shadow:0 18px 55px var(--sh),0 4px 14px var(--sh)}
.photo-mat img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;filter:saturate(0.9) contrast(0.97)}
.photo-mat .cap{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;color:#ccc}

#empty{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:5;transition:opacity 0.5s}
#empty p{font-style:italic;font-size:1.3rem;color:var(--ink);opacity:0.22;letter-spacing:0.05em}
#empty span{display:block;font-family:var(--mono);font-size:9px;color:var(--ink);opacity:0.15;margin-top:10px;letter-spacing:0.18em;text-transform:uppercase}

#player{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;align-items:center;gap:10px;background:rgba(245,240,232,0.92);backdrop-filter:blur(8px);border:1px solid rgba(26,22,18,0.1);padding:9px 16px}
#pp{background:none;border:none;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;width:22px;height:22px;transition:transform 0.15s}
#pp:hover{transform:scale(1.2)}
#track{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--ink);opacity:0.55;white-space:nowrap}
.bars{display:flex;align-items:center;gap:2px;height:16px}
.bars b{display:block;width:3px;height:3px;border-radius:1px;background:var(--ink);opacity:0.5;animation:bu 1s ease-in-out infinite alternate}
.bars b:nth-child(2){animation-duration:1.1s;animation-delay:.15s}
.bars b:nth-child(3){animation-duration:.8s;animation-delay:.3s}
@keyframes bu{from{height:3px}to{height:14px}}
.bars.off b{animation-play-state:paused;height:3px}
</style>
</head>
<body>

<div id="enter">
  <h1>dots</h1>
  <p>a place for your memories</p>
  <button id="enter-btn">enter</button>
</div>

<div id="stage"></div>

<div id="bar">
  <div id="bar-logo">dots</div>
  <button id="add-btn">+ add photos</button>
  <input type="file" id="file-in" accept="image/*" multiple>
</div>

<div id="empty">
  <p>your memories live here</p>
  <span>click + add photos to begin</span>
</div>

<div id="player">
  <button id="pp">
    <svg id="i-play" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="i-pause" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>
  <div class="bars off" id="bars"><b></b><b></b><b></b></div>
  <div id="track">sleepyhead — passion pit</div>
</div>

<!-- Load song data first, then init -->
<script src="song.js"></script>
<script>
// AUDIO — uses SONG_DATA from song.js (base64), falls back to song.mp3
var audio;
if (typeof SONG_DATA !== 'undefined') {
  audio = new Audio(SONG_DATA);
} else {
  audio = new Audio('song.mp3');
}
audio.loop = true;
audio.volume = 0.6;

var iPlay  = document.getElementById('i-play');
var iPause = document.getElementById('i-pause');
var bars   = document.getElementById('bars');

function setUI(on) {
  iPlay.style.display  = on ? 'none' : '';
  iPause.style.display = on ? '' : 'none';
  bars.classList.toggle('off', !on);
}

// ENTER — audio.play() called directly in click handler
document.getElementById('enter-btn').addEventListener('click', function () {
  var screen = document.getElementById('enter');
  screen.classList.add('gone');
  setTimeout(function () { if (screen.parentNode) screen.parentNode.removeChild(screen); }, 1050);
  audio.play();
  setUI(true);
});

document.getElementById('pp').addEventListener('click', function () {
  if (audio.paused) { audio.play(); setUI(true); }
  else { audio.pause(); setUI(false); }
});

// INDEXEDDB
var db;
function openDB(cb) {
  var r = indexedDB.open('dots_v4', 1);
  r.onupgradeneeded = function (e) { e.target.result.createObjectStore('photos', { keyPath: 'id' }); };
  r.onsuccess = function (e) { db = e.target.result; cb(); };
  r.onerror = function (e) { console.error('DB error', e); };
}
function savePhoto(id, url, cb) {
  var tx = db.transaction('photos', 'readwrite');
  tx.objectStore('photos').put({ id: id, dataUrl: url, ts: Date.now() });
  tx.oncomplete = cb;
}
function loadAll(cb) {
  var req = db.transaction('photos', 'readonly').objectStore('photos').getAll();
  req.onsuccess = function (e) { cb(e.target.result); };
}

// COLLAGE
var stage = document.getElementById('stage');
var empty = document.getElementById('empty');
var zTop = 1, animN = 0;
var SIZES = [150, 175, 205, 235, 265];
function rand(a, b) { return a + Math.random() * (b - a); }

function addPhoto(dataUrl) {
  empty.style.opacity = '0';
  var n = ++animN;
  var size = SIZES[Math.floor(Math.random() * SIZES.length)];
  var imgH = Math.round(size * rand(0.72, 1.38));
  var x = rand(10, Math.max(30, window.innerWidth - size - 30));
  var y = rand(65, Math.max(80, window.innerHeight - imgH - 80));
  var rot = rand(-13, 13);
  var dx = rand(-32, 32), dy = rand(-22, 22), dr = rand(-3.5, 3.5), dur = rand(15, 38);

  var sty = document.createElement('style');
  sty.textContent = '@keyframes fl' + n + '{from{transform:rotate(' + rot + 'deg) translate(0,0)}to{transform:rotate(' + (rot+dr) + 'deg) translate(' + dx + 'px,' + dy + 'px)}}';
  document.head.appendChild(sty);

  var wrap = document.createElement('div');
  wrap.className = 'photo';
  wrap.style.cssText = 'left:' + x + 'px;top:' + y + 'px;width:' + size + 'px;z-index:' + (zTop++) + ';animation:fl' + n + ' ' + dur + 's ease-in-out infinite alternate;';

  var mat = document.createElement('div');
  mat.className = 'photo-mat';
  mat.style.cssText = 'width:' + size + 'px;height:' + imgH + 'px;';

  var img = document.createElement('img');
  img.src = dataUrl; img.draggable = false;

  var cap = document.createElement('div');
  cap.className = 'cap'; cap.textContent = '· · ·';

  mat.appendChild(img); mat.appendChild(cap);
  wrap.appendChild(mat); stage.appendChild(wrap);
  makeDrag(wrap);
}

function makeDrag(el) {
  var ox, oy, sx, sy, active = false;
  function getXY(e) { return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY }; }
  function onDown(e) {
    var p = getXY(e); sx = p.x; sy = p.y;
    ox = parseInt(el.style.left) || 0; oy = parseInt(el.style.top) || 0;
    active = true; el.style.zIndex = zTop++; el.style.animationPlayState = 'paused';
    window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp);
  }
  function onMove(e) {
    if (!active) return; if (e.cancelable) e.preventDefault();
    var p = getXY(e); el.style.left = (ox + p.x - sx) + 'px'; el.style.top = (oy + p.y - sy) + 'px';
  }
  function onUp() {
    active = false; el.style.animationPlayState = 'running';
    window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp);
    window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp);
  }
  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, { passive: true });
}

// UPLOAD
document.getElementById('add-btn').addEventListener('click', function () { document.getElementById('file-in').click(); });
document.getElementById('file-in').addEventListener('change', function (e) {
  var files = Array.from(e.target.files), i = 0;
  function next() {
    if (i >= files.length) { e.target.value = ''; return; }
    var fr = new FileReader();
    fr.onload = function (ev) {
      var url = ev.target.result;
      var id = 'p' + Date.now() + '_' + Math.random().toString(36).slice(2);
      savePhoto(id, url, function () { addPhoto(url); next(); });
    };
    fr.readAsDataURL(files[i++]);
  }
  next();
});

// INIT
openDB(function () {
  loadAll(function (photos) {
    photos.sort(function (a, b) { return a.ts - b.ts; });
    if (photos.length) empty.style.opacity = '0';
    photos.forEach(function (p) { addPhoto(p.dataUrl); });
  });
});
</script>
</body>
</html>
