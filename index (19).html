<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dots</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --ink: #1a1612;
    --shadow: rgba(26,22,18,0.18);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'Space Mono', 'Courier New', monospace;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--cream);
    font-family: var(--serif);
  }

  /* ENTER SCREEN */
  #enter-screen {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 1s ease;
  }
  #enter-screen.gone {
    opacity: 0;
    pointer-events: none;
  }
  #enter-logo {
    font-style: italic;
    font-weight: 300;
    font-size: 5rem;
    color: var(--ink);
    letter-spacing: 0.15em;
  }
  #enter-tagline {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.3;
  }
  #enter-btn {
    margin-top: 12px;
    background: transparent;
    border: 1px solid rgba(26,22,18,0.35);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 13px 36px;
    cursor: pointer;
    transition: all 0.25s;
  }
  #enter-btn:hover {
    background: var(--ink);
    color: var(--cream);
  }

  /* STAGE */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: crosshair;
  }

  /* TOP BAR */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 26px;
    z-index: 1000;
    pointer-events: none;
  }
  #logo {
    font-style: italic;
    font-weight: 300;
    font-size: 2.2rem;
    color: var(--ink);
    letter-spacing: 0.1em;
    opacity: 0.8;
    text-shadow: 0 1px 6px rgba(245,240,232,0.9);
  }
  #upload-btn {
    pointer-events: all;
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    opacity: 0.85;
  }
  #upload-btn:hover { opacity: 1; transform: translateY(-1px); }
  #file-input { display: none; }

  /* PHOTOS */
  .photo {
    position: absolute;
    user-select: none;
    cursor: grab;
  }
  .photo:active { cursor: grabbing; }
  .photo-inner {
    background: #fff;
    padding: 9px 9px 30px;
    box-shadow: 0 6px 28px var(--shadow), 0 1px 6px var(--shadow);
    transition: box-shadow 0.25s;
  }
  .photo:hover .photo-inner {
    box-shadow: 0 18px 55px var(--shadow), 0 4px 14px var(--shadow);
  }
  .photo-inner img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    filter: saturate(0.9) contrast(0.97);
  }
  .photo-inner .cap {
    position: absolute;
    bottom: 5px; left: 0; right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    color: #bbb;
  }

  /* EMPTY MSG */
  #empty-msg {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.5s;
  }
  #empty-msg p {
    font-style: italic;
    font-size: 1.4rem;
    color: var(--ink);
    opacity: 0.25;
    letter-spacing: 0.05em;
  }
  #empty-msg small {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--ink);
    opacity: 0.18;
    margin-top: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* PLAYER */
  #player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(26,22,18,0.1);
    padding: 9px 16px;
  }
  #play-pause {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    transition: transform 0.15s;
  }
  #play-pause:hover { transform: scale(1.2); }
  #track-info {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink);
    opacity: 0.6;
    white-space: nowrap;
  }
  .bars {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 16px;
  }
  .bars span {
    display: block;
    width: 3px;
    height: 3px;
    border-radius: 1px;
    background: var(--ink);
    opacity: 0.5;
    animation: bar 1s ease-in-out infinite alternate;
  }
  .bars span:nth-child(2) { animation-duration: 1.1s; animation-delay: 0.15s; }
  .bars span:nth-child(3) { animation-duration: 0.8s; animation-delay: 0.3s; }
  @keyframes bar {
    from { height: 3px; }
    to   { height: 14px; }
  }
  .bars.paused span { animation-play-state: paused; }
</style>
</head>
<body>

<div id="enter-screen">
  <div id="enter-logo">dots</div>
  <div id="enter-tagline">a place for your memories</div>
  <button id="enter-btn">enter</button>
</div>

<div id="stage"></div>

<div id="topbar">
  <div id="logo">dots</div>
  <button id="upload-btn">+ add photos</button>
  <input type="file" id="file-input" accept="image/*" multiple>
</div>

<div id="empty-msg">
  <p>your memories live here</p>
  <small>click + add photos to begin</small>
</div>

<div id="player">
  <button id="play-pause">
    <svg id="ico-play"  width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="ico-pause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>
  <div class="bars paused" id="bars"><span></span><span></span><span></span></div>
  <div id="track-info">sleepyhead — passion pit</div>
</div>

<audio id="audio" src="song.mp3" loop preload="auto"></audio>

<script>
// AUDIO
const audio    = document.getElementById('audio');
const ppBtn    = document.getElementById('play-pause');
const icoPlay  = document.getElementById('ico-play');
const icoPause = document.getElementById('ico-pause');
const bars     = document.getElementById('bars');
audio.volume   = 0.6;

function setPlaying(on) {
  icoPlay.style.display  = on ? 'none' : '';
  icoPause.style.display = on ? '' : 'none';
  bars.classList.toggle('paused', !on);
}

ppBtn.addEventListener('click', () => {
  if (audio.paused) { audio.play(); setPlaying(true); }
  else              { audio.pause(); setPlaying(false); }
});

// ENTER
const enterScreen = document.getElementById('enter-screen');
document.getElementById('enter-btn').addEventListener('click', () => {
  enterScreen.classList.add('gone');
  setTimeout(() => { if (enterScreen.parentNode) enterScreen.parentNode.removeChild(enterScreen); }, 1100);
  audio.play().then(() => setPlaying(true)).catch(() => {});
});

// INDEXEDDB
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('dots_v2', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('photos', { keyPath: 'id' });
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror   = rej;
  });
}
function savePhoto(id, dataUrl) {
  return new Promise((res, rej) => {
    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').put({ id, dataUrl, ts: Date.now() });
    tx.oncomplete = res; tx.onerror = rej;
  });
}
function loadAll() {
  return new Promise((res, rej) => {
    const req = db.transaction('photos', 'readonly').objectStore('photos').getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror   = rej;
  });
}

// COLLAGE
const stage    = document.getElementById('stage');
const emptyMsg = document.getElementById('empty-msg');
let zTop = 1, animN = 0;
const SIZES = [150, 175, 200, 230, 260];
const rand = (a, b) => a + Math.random() * (b - a);

function addPhoto(dataUrl) {
  emptyMsg.style.opacity = '0';
  const n    = ++animN;
  const size = SIZES[Math.floor(Math.random() * SIZES.length)];
  const imgH = Math.round(size * rand(0.7, 1.4));
  const x    = rand(10, Math.max(30, window.innerWidth  - size - 30));
  const y    = rand(65, Math.max(80, window.innerHeight - imgH - 80));
  const rot  = rand(-13, 13);
  const dx = rand(-30, 30), dy = rand(-20, 20), dr = rand(-3, 3);
  const dur = rand(16, 38);

  const kf = document.createElement('style');
  kf.textContent = `@keyframes fl${n}{from{transform:rotate(${rot}deg) translate(0,0)}to{transform:rotate(${rot+dr}deg) translate(${dx}px,${dy}px)}}`;
  document.head.appendChild(kf);

  const wrap = document.createElement('div');
  wrap.className = 'photo';
  wrap.style.cssText = `left:${x}px;top:${y}px;width:${size}px;z-index:${zTop++};animation:fl${n} ${dur}s ease-in-out infinite alternate;`;

  const inner = document.createElement('div');
  inner.className = 'photo-inner';
  inner.style.cssText = `width:${size}px;height:${imgH}px;`;

  const img = document.createElement('img');
  img.src = dataUrl; img.draggable = false;

  const cap = document.createElement('div');
  cap.className = 'cap'; cap.textContent = '· · ·';

  inner.appendChild(img); inner.appendChild(cap); wrap.appendChild(inner); stage.appendChild(wrap);
  drag(wrap);
}

function drag(el) {
  let ox, oy, sx, sy, on = false;
  const xy = e => e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
  function down(e) {
    const p = xy(e); sx = p.x; sy = p.y;
    ox = parseInt(el.style.left)||0; oy = parseInt(el.style.top)||0;
    on = true; el.style.zIndex = zTop++; el.style.animationPlayState = 'paused';
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, { passive: false }); window.addEventListener('touchend', up);
  }
  function move(e) {
    if (!on) return; if (e.cancelable) e.preventDefault();
    const p = xy(e); el.style.left = (ox+p.x-sx)+'px'; el.style.top = (oy+p.y-sy)+'px';
  }
  function up() {
    on = false; el.style.animationPlayState = 'running';
    window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
    window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
  }
  el.addEventListener('mousedown', down); el.addEventListener('touchstart', down, { passive: true });
}

// UPLOAD
document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', async e => {
  for (const file of Array.from(e.target.files)) {
    const url = await new Promise(r => { const fr = new FileReader(); fr.onload = ev => r(ev.target.result); fr.readAsDataURL(file); });
    const id  = 'p' + Date.now() + Math.random().toString(36).slice(2);
    await savePhoto(id, url);
    addPhoto(url);
  }
  e.target.value = '';
});

// INIT
openDB().then(loadAll).then(photos => {
  photos.sort((a,b) => a.ts - b.ts);
  if (photos.length) emptyMsg.style.opacity = '0';
  photos.forEach(p => addPhoto(p.dataUrl));
}).catch(console.error);
</script>
</body>
</html>
